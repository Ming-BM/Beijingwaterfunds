<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录 - 资金计划填报系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "微软雅黑", Arial, sans-serif; background: #f0f2f5;
  display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  padding: 40px 44px; width: 360px; }
.logo { text-align: center; margin-bottom: 28px; }
.logo h1 { font-size: 20px; color: #1a3a6b; font-weight: bold; margin-top: 8px; }
.logo p { font-size: 12px; color: #999; margin-top: 4px; }
label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; margin-top: 18px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 5px;
  font-size: 14px; outline: none; font-family: inherit; }
input:focus { border-color: #1a3a6b; box-shadow: 0 0 0 2px rgba(26,58,107,0.12); }
.btn-login { width: 100%; margin-top: 24px; padding: 11px; background: #1a3a6b; color: white;
  border: none; border-radius: 5px; font-size: 15px; cursor: pointer; font-family: inherit; }
.btn-login:hover { background: #2451a3; }
.error { background: #fef0f0; border: 1px solid #f5c6cb; color: #c0392b;
  border-radius: 5px; padding: 9px 12px; font-size: 13px; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <h1>资金计划填报系统</h1>
    <p>请使用分配的账号登录</p>
  </div>
  <form method="post">
    <label>用户名</label>
    <input type="text" name="username" placeholder="请输入用户名" autofocus autocomplete="username">
    <label>密码</label>
    <input type="password" name="password" placeholder="请输入密码" autocomplete="current-password">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <button type="submit" class="btn-login">登 录</button>
  </form>
</div>
</body>
</html>
